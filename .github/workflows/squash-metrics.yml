name: Preserve AI LOC on Squash Merge

on:
  pull_request:
    types: [closed]

jobs:
  preserve-metrics:
    if: ${{ github.event.pull_request.merged == true }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Fetch PR head
        run: |
          git fetch origin "pull/${{ github.event.pull_request.number }}/head:pr_head"
          git fetch origin ${{ github.event.pull_request.base.ref }}

      - name: Sum and amend metrics
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"

          BASE_SHA="${{ github.event.pull_request.base.sha }}"

          PR_COMMIT_COUNT=$(git rev-list ${BASE_SHA}..pr_head --count)
          echo "PR commit count: $PR_COMMIT_COUNT"

          # only process if squash (PR had multiple commits)
          if [ "$PR_COMMIT_COUNT" -le 1 ]; then
            echo "Single commit PR — skipping squash metrics"
            exit 0
          fi

          total_ai=0
          total_manual=0

          while IFS= read -r line; do
            if [[ "$line" =~ AI-Lines-Of-Code:\ ([0-9]+) ]]; then
              total_ai=$((total_ai + ${BASH_REMATCH[1]}))
            fi
            if [[ "$line" =~ Manual-LOC:\ ([0-9]+) ]]; then
              total_manual=$((total_manual + ${BASH_REMATCH[1]}))
            fi
          done < <(git log ${BASE_SHA}..pr_head --format="%B")

          echo "Total AI: $total_ai, Manual: $total_manual"

          git checkout ${{ github.event.pull_request.base.ref }}
          git pull origin ${{ github.event.pull_request.base.ref }}

          # get only PR title
          CURRENT_MSG=$(git log -1 --format="%s")

          NEW_MSG=$(printf "%s\n\nAI-Lines-Of-Code: %s\nManual-LOC: %s" "$CURRENT_MSG" "$total_ai" "$total_manual")

          git commit --amend -m "${NEW_MSG}"
          git push --force-with-lease origin ${{ github.event.pull_request.base.ref }}